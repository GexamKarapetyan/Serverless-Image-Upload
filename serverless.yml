service: img-upload-api

frameworkVersion: "3"

provider:
  name: aws
  runtime: nodejs18.x
  region: eu-north-1
  environment:
    BUCKET_NAME: ${self:service}-uploads-${sls:stage}-${aws:accountId}
    TABLE_NAME: ${self:service}-uploads-${sls:stage}
    QUEUE_URL: !Sub "https://sqs.${AWS::Region}.amazonaws.com/${AWS::AccountId}/${self:service}-uploads-${sls:stage}"

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
          Resource: !Sub "arn:aws:s3:::${self:service}-uploads-${sls:stage}-${aws:accountId}/*"
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
          Resource: !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${self:service}-uploads-${sls:stage}"
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
          Resource: !Sub "arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:${self:service}-uploads-${sls:stage}"

functions:
  createUpload:
    handler: src/createUpload.handler
    events:
      - httpApi:
          path: /uploads
          method: POST

  getUploadStatus:
    handler: src/getUploadStatus.handler
    events:
      - httpApi:
          path: /uploads/{uploadId}
          method: GET

  processUpload:
    handler: src/processUpload.handler

resources:
  Resources:

    UploadsDeadLetterQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-uploads-dlq-${sls:stage}

    UploadsQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-uploads-${sls:stage}
        VisibilityTimeout: 30
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt UploadsDeadLetterQueue.Arn
          maxReceiveCount: 3

    UploadsQueuePolicy:
      Type: AWS::SQS::QueuePolicy
      Properties:
        Queues:
          - !Ref UploadsQueue
        PolicyDocument:
          Statement:
            - Effect: Allow
              Principal:
                Service: s3.amazonaws.com
              Action: sqs:SendMessage
              Resource: !GetAtt UploadsQueue.Arn
              Condition:
                ArnLike:
                  aws:SourceArn: !Sub "arn:aws:s3:::${self:service}-uploads-${sls:stage}-${aws:accountId}"

    UploadsBucket:
      Type: AWS::S3::Bucket
      DependsOn: UploadsQueuePolicy
      Properties:
        BucketName: ${self:service}-uploads-${sls:stage}-${aws:accountId}
        CorsConfiguration:
          CorsRules:
            - AllowedOrigins: ["*"]
              AllowedMethods: [PUT]
              AllowedHeaders: ["*"]
              MaxAge: 3000
        NotificationConfiguration:
          QueueConfigurations:
            - Event: "s3:ObjectCreated:*"
              Filter:
                S3Key:
                  Rules:
                    - Name: prefix
                      Value: "uploads/"
              Queue: !GetAtt UploadsQueue.Arn

    UploadsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-uploads-${sls:stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: uploadId
            AttributeType: S
        KeySchema:
          - AttributeName: uploadId
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    ProcessUploadEventSourceMapping:
      Type: AWS::Lambda::EventSourceMapping
      DependsOn:
        - UploadsQueue
        - ProcessUploadLambdaFunction
      Properties:
        EventSourceArn: !GetAtt UploadsQueue.Arn
        FunctionName: !GetAtt ProcessUploadLambdaFunction.Arn
        BatchSize: 1
        Enabled: true

  Outputs:
    ApiEndpoint:
      Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
    BucketName:
      Value: !Ref UploadsBucket